<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DFly — Mariage · Photographie & Vidéo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&family=Italiana&family=Petit+Formal+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-theme="ivory">
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="mariage.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "ivory",
  "typo": "cormorant",
  "grain": 0.07
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = React.useState("FR");

  React.useEffect(() => {
    document.body.setAttribute("data-theme", tweaks.palette);
    document.documentElement.style.setProperty("--grain-opacity", String(tweaks.grain));
    const typoMap = {
      cormorant: "'Cormorant Garamond', 'Cormorant', Georgia, serif",
      italiana:  "'Italiana', 'Cormorant Garamond', serif",
      playfair:  "'Playfair Display', 'Cormorant Garamond', serif",
    };
    document.documentElement.style.setProperty("--serif-display", typoMap[tweaks.typo] || typoMap.cormorant);
  }, [tweaks]);

  React.useEffect(() => {
    if (!document.getElementById("dfly-extra-fonts")) {
      const link = document.createElement("link");
      link.id = "dfly-extra-fonts";
      link.rel = "stylesheet";
      link.href = "https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap";
      document.head.appendChild(link);
    }
  }, []);

  return (
    <>
      <Mariage lang={lang} setLang={setLang} />
      <TweaksPanel title="Tweaks · DFly">
        <TweakSection title="Palette">
          <TweakRadio
            value={tweaks.palette}
            onChange={(v) => setTweak("palette", v)}
            options={[
              { value: "ivory", label: "Ivoire" },
              { value: "sage",  label: "Encre" },
              { value: "dark",  label: "Sombre" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Typographie principale">
          <TweakRadio
            value={tweaks.typo}
            onChange={(v) => setTweak("typo", v)}
            options={[
              { value: "cormorant", label: "Cormorant" },
              { value: "italiana",  label: "Italiana" },
              { value: "playfair",  label: "Playfair" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Grain photo">
          <TweakSlider
            value={tweaks.grain}
            min={0} max={0.18} step={0.01}
            onChange={(v) => setTweak("grain", v)}
            format={(v) => `${Math.round(v * 100)}%`}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
